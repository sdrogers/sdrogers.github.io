---
title: Categories
---

<ul>
    {% for category in site.categories %}
        <li>{{ category[0] }}</li>
        <ul>
            {% for post in category[1] %}
                <li>{{ post.date | date_to_string }} <a href="{{ post.url }}">{{ post.title }}</a></li>
            {% endfor %}
        </ul>
    {% endfor %}
</ul>
